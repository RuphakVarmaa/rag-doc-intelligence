app = "rag-doc-backend"
primary_region = "sin"

[build]

[env]
  PORT = "8000"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[checks]]
  name = "health"
  port = 8000
  type = "http"
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  path = "/health"
